<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GameZone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: sans-serif;
            background-image: url('images/contact-bg.png.jpg'); /* نفس الباكجراوند الرايقة بتاعتك */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* 🌟 كود الأنميشن السحري للدخلة الفخمة 🌟 */
        @keyframes pageFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* حاوية الأنميشن اللي بتخلي العناصر تفتح بنعومة */
        .animated-content {
            animation: pageFadeIn 0.8s ease-out forwards;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* 🌟 تنسيق الـ Navbar الجديد والمتناسق 🌟 */
        .navbar {
            background-color: #0f172a;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #38bdf8;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #38bdf8;
        }

        .welcome-user {
            font-size: 14px;
            color: #9ca3af;
            margin-right: 15px;
        }

        .welcome-user b {
            color: #a855f7;
        }

        .cart-status {
            background-color: #a855f7;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);
        }

        /* العنوان النيون */
        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 40px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #a855f7, 0 0 20px #38bdf8;
            text-align: center;
        }

        /* صندوق الفورم الشفاف الزجاجي */
        .glass-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(168, 85, 247, 0.25);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #9ca3af;
            font-weight: bold;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid #14b8a6; /* نيون مينت */
            color: white;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-group textarea {
            resize: none;
            height: 100px;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
        }

        /* زرار الإرسال */
        .submit-btn {
            width: 100%;
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .submit-btn:hover {
            background-color: #9333ea;
            transform: scale(1.02);
        }

        /* جدول عرض البيانات المستقبلة */
        .table-container {
            width: 100%;
            max-width: 800px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(20, 184, 166, 0.3);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            display: none; /* هيظهر بس لما يكون فيه بيانات */
            margin-bottom: 40px;
        }

        .table-container h3 {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #a855f7, #14b8a6);
            margin: 0;
            padding: 15px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 14px;
        }

        th {
            background-color: rgba(255, 255, 255, 0.05);
            color: #14b8a6;
            font-weight: bold;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(168, 85, 247, 0.1);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">GameZone</a>
        <div class="nav-links">
            <span class="welcome-user">Welcome, <b id="welcomeMessage">Admin</b>! 🎮</span>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="about.html">About</a>
            <a href="products.html" class="cart-status" id="cartCountNav">My Cart 🛒 (0)</a>
        </div>
    </nav>

    <div class="animated-content">
        
        <h1 class="page-title">Contact Support</h1>

        <div class="glass-container">
            <form id="contactForm">
                <div class="input-group">
                    <label for="userName">Your Name</label>
                    <input type="text" id="userName" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label for="userEmail">Email Address</label>
                    <input type="email" id="userEmail" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="userMessage">Message</label>
                    <textarea id="userMessage" placeholder="How can we help you, gamer?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>

        <div class="table-container" id="tableContainer">
            <h3 id="tableHeader">Message Sent Successfully!</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Your Submitted Message</th>
                    </tr>
                </thead>
                <tbody id="messagesTableBody">
                </tbody>
            </table>
        </div>

    </div> 
    
    <script>
        const contactForm = document.getElementById('contactForm');
        const tableContainer = document.getElementById('tableContainer');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('messagesTableBody');

        // دالة لتحديث عداد الكارت اللي فوق في الـ Navbar عشان يقرأ المنتجات لو موجودة
        function updateCartCountNav() {
            let cart = JSON.parse(localStorage.getItem('cartItems')) || [];
            let totalItemsCount = 0;
            cart.forEach(item => {
                totalItemsCount += item.quantity;
            });
            const cartCountNav = document.getElementById('cartCountNav');
            if (cartCountNav) {
                cartCountNav.innerText = `My Cart 🛒 (${totalItemsCount})`;
            }
        }

        // عند الضغط على زرار Send Message
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. سحب البيانات اللي اليوزر كتبها حالا
            let name = document.getElementById('userName').value;
            let email = document.getElementById('userEmail').value;
            let message = document.getElementById('userMessage').value;

            // 2. إظهار حاوية الجدول وتغيير لون الهيدر لأخضر نيون مريح للعين يدل على النجاح
            tableContainer.style.display = 'block'; 
            tableHeader.innerHTML = '<i class="fas fa-check-circle"></i> Ticket Submitted Successfully!';
            tableHeader.style.background = "linear-gradient(90deg, #10b981, #14b8a6)"; /* تدرج أخضر نيون فخم */

            // 3. عرض رسالة اليوزر الحالي "فقط" عشان نأكدله الإرسال وميشفش حاجة قديمة
            tableBody.innerHTML = `<tr>
                <td>${name}</td>
                <td>${email}</td>
                <td>${message}</td>
            </tr>`;

            // 4. تصفية (Reset) خانات الفورم عشان لو حب يكتب رسالة جديدة
            contactForm.reset();
        });

        // تشغيل الوظائف عند فتح الصفحة
        window.onload = function() {
            // شيلنا دالة الـ loadMessages عشان ميعرضش القديم نهائياً أول ما نفتح
            updateCartCountNav();

            // قراءة اسم الشخص اللي عمل Login من الـ LocalStorage وعرضه في الـ Navbar
            let loggedInUser = localStorage.getItem("loggedInUser");
            let welcomeMessage = document.getElementById("welcomeMessage");
            if (welcomeMessage && loggedInUser) {
                welcomeMessage.innerText = loggedInUser;
            }
        };
    </script>
</body>
</html>
